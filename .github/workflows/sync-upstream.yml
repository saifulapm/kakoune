name: Sync upstream Kakoune

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/mawww/kakoune.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Cherry-pick new upstream commits, one PR per commit
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -e
          LAST_SYNCED=$(cat .github/upstream-sha)
          UPSTREAM_HEAD=$(git rev-parse upstream/master)

          if [ "$UPSTREAM_HEAD" = "$(git rev-parse "$LAST_SYNCED")" ]; then
            echo "Already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Walk commits oldest → newest so order matches upstream history
          COMMITS=$(git rev-list --reverse "$LAST_SYNCED".."$UPSTREAM_HEAD")
          echo "New upstream commits:"
          echo "$COMMITS"

          for SHA in $COMMITS; do
            SHORT=$(git rev-parse --short "$SHA")
            SUBJECT=$(git log -1 --format=%s "$SHA")
            BRANCH="sync/$SHORT"

            # Skip if branch or PR already exists (dedupe across runs)
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Branch $BRANCH already exists — skipping"
              continue
            fi

            git checkout main
            git checkout -b "$BRANCH"

            # Skip commits that only touch .github/workflows (GITHUB_TOKEN cannot push there)
            FILES=$(git show --name-only --format= "$SHA")
            if [ -n "$FILES" ] && ! echo "$FILES" | grep -qv '^\.github/workflows/'; then
              echo "Commit $SHORT only touches .github/workflows — skipping"
              continue
            fi

            # Skip commits that touch no files (e.g. copyright waivers)
            if [ -z "$(git show --name-only --format= "$SHA")" ]; then
              echo "Commit $SHORT has no file changes — skipping"
              continue
            fi

            if git cherry-pick --allow-empty "$SHA"; then
              # Drop any .github/workflows changes from the cherry-pick
              if git diff HEAD~1 --name-only | grep -q '^\.github/workflows/'; then
                git diff HEAD~1 --name-only -- .github/workflows/ | while read -r f; do
                  if git show "main:$f" > /dev/null 2>&1; then
                    git checkout main -- "$f"
                  else
                    git rm -f "$f"
                  fi
                done
                git commit --amend --no-edit
              fi

              git push origin "$BRANCH"
              gh api repos/${{ github.repository }}/pulls \
                -f title="Sync: $SUBJECT" \
                -f body="Cherry-pick of upstream commit [\`$SHORT\`](https://github.com/mawww/kakoune/commit/$SHA) from mawww/kakoune." \
                -f base=main \
                -f head="$BRANCH"
            else
              echo "::warning title=Sync conflict::Cherry-picking $SHORT ($SUBJECT) conflicts with this fork — skipping. Resolve manually with: git fetch upstream && git checkout -b sync/$SHORT && git cherry-pick $SHA"
              git cherry-pick --abort
            fi
          done

          # Advance upstream-sha on main to UPSTREAM_HEAD so next run only sees newer commits
          git checkout main
          echo "$UPSTREAM_HEAD" > .github/upstream-sha
          if ! git diff --quiet; then
            git add .github/upstream-sha
            git commit -m "chore: update upstream-sha to $UPSTREAM_HEAD"
            git push origin main
          fi
