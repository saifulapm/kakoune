name: Sync upstream Kakoune

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 6am UTC
  workflow_dispatch:       # manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/mawww/kakoune.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new commits
        id: check
        run: |
          LAST_SYNCED=$(cat .github/upstream-sha)
          UPSTREAM_HEAD=$(git rev-parse upstream/master)
          echo "Last synced: $LAST_SYNCED"
          echo "Upstream HEAD: $UPSTREAM_HEAD"

          if [ "$UPSTREAM_HEAD" = "$(git rev-parse "$LAST_SYNCED")" ]; then
            echo "Already up to date"
            echo "has_new=false" >> $GITHUB_OUTPUT
          else
            BEHIND=$(git rev-list "$LAST_SYNCED".."$UPSTREAM_HEAD" --count)
            echo "behind=$BEHIND" >> $GITHUB_OUTPUT
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "upstream_head=$UPSTREAM_HEAD" >> $GITHUB_OUTPUT
            echo "Upstream has $BEHIND new commits since last sync"
          fi

      - name: Create sync branch and PR
        if: steps.check.outputs.has_new == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"

          # Attempt merge — if conflicts arise, commit them as-is for manual resolution
          if git merge upstream/master --no-edit; then
            echo "Clean merge"
          else
            echo "Merge has conflicts — committing conflict markers for manual resolution"
            git add -A
            git commit --no-edit -m "sync: merge upstream/master (conflicts need resolution)"
          fi

          # Remove upstream workflow changes — GITHUB_TOKEN cannot push to .github/workflows/
          git diff main --name-only -- .github/workflows/ | while read -r f; do
            if git ls-tree -r main --name-only -- "$f" > /dev/null 2>&1 && git show "main:$f" > /dev/null 2>&1; then
              git checkout main -- "$f"
            else
              git rm -f "$f"
            fi
          done
          if ! git diff --cached --quiet || git diff --cached --name-only | grep -q .; then
            git commit -m "sync: preserve local workflows (upstream workflow changes excluded)"
          fi

          # Check if merge actually brought in changes
          if git diff --quiet main; then
            echo "Already up to date — no changes from upstream"
            exit 0
          fi

          git push origin "$BRANCH"

          # Check if PR already exists
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
            exit 0
          fi

          BEHIND=${{ steps.check.outputs.behind }}
          gh api repos/${{ github.repository }}/pulls \
            -f title="Sync upstream Kakoune $(date +%Y-%m-%d)" \
            -f body="Automated sync of $BEHIND commits from [mawww/kakoune](https://github.com/mawww/kakoune) master branch." \
            -f base=main \
            -f head="$BRANCH"

          # Update last synced SHA on main so next run skips these commits
          UPSTREAM_HEAD=${{ steps.check.outputs.upstream_head }}
          git checkout main
          echo "$UPSTREAM_HEAD" > .github/upstream-sha
          git add .github/upstream-sha
          git commit -m "chore: update upstream-sha to $UPSTREAM_HEAD"
          git push origin main
